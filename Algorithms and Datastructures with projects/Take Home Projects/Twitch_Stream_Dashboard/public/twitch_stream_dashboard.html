<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta 
            name="viewport"
            http-equiv="content-type" content="width=width-device" initial-scale="1.0" 
        />
    </head>

    <style>

        body
        {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: arial, sans-serif;
        }

        .nav
        {
            display: flex;
            padding: 0;
            margin: 0;
            list-style-type: none;
            overflow: hidden;
            background: linear-gradient(90deg, #1f1c2c, #2c3e50);
        }

        .nav li a
        {
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 12px 14px;
            color: white;
        }

        .nav li a:hover
        {
            background-color: #393434;
        }

        .mainbody
        {
            height: calc(100vh - 20px);
            /*background-color: rgb(191, 174, 143);*/
            background-color: #ECF0E7;
            overflow: auto;
        }

        .displayresults
        {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;

            width: 60%;
            margin: 20px auto;

            border-color: 2px solid grey;
            border-radius: 5px;
            background-color: grey;
        }

        #streamerheaders
        {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 48px;
        }

        .status-tags
        {
            display: flex;
            position: absolute;
            right: 20px;
            
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .tag
        {
            display: inline-flex;
            align-items: center;
            overflow: hidden;

            width: 16px;
            height: 16px;

            border-radius: 20px;
            padding: 2px; 

            cursor: pointer;
            transition: width 0.3s ease;
        }

        .tag:hover
        {
            width: 85px;
        } 
        
        .online
        {
            background-color: #6dbb63;
        }

        .offline
        {
            background-color: #7ea5d8;
        }

        .circle
        {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .online .circle
        {
            background-color: green;
        }

        .offline .circle
        {
            background-color: steelblue;
        }

        .label
        {
            margin-right: 2px;
            white-space: nowrap;
            opacity: 0;
            width: 100%;
            text-align: center;
            transition: opacity 0.2s ease;
            font-family: cursive;
        }

        .tag:hover .label
        {
            opacity: 1;
        }

        .items
        {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        #arr-list
        {
            width: 60%;
            padding: 0;
        }

        #arr-list li
        {
            display: grid;
            grid-template-columns: 250px 1fr 120px;
            align-items: center;
            gap: 40px;
            padding: 20px 25px;
            list-style-type: none;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #arr-list a
        {
            color: rgb(26, 80, 98);
            text-decoration: none;
        }

        #arr-list a:hover
        {
            text-decoration: underline;
        }

        #arr-list img
        {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            object-fit: cover;
        }

        .left
        {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 200px;
            flex-shrink: 0;
        }

        .right
        {
            display: flex;
            /*align-items: center;*/
            gap: 20px;
            min-width: 0;
            overflow: hidden;
            margin-left: 80px;
        }

        .right .streamgame
        {
            white-space: nowrap;
            flex-shrink: 0;
        }

        .right .streamtitle
        {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            max-width: 60%;
        }

    </style>

    <body>
        <ul class="nav">
            <li><a href="#about"> about </a></li>
            <li><a href="#signup"> signup </a></li>
            <li><a href="#login"> login </a></li>
            <li><a href="#twitch"> twitch </a></li>
        </ul>

        <div class="mainbody">
            <div class="displayresults">
                <h2 id="streamerheaders" > Twitch Streamers </h2>
                <div class="status-tags">
                    <div class="tag online">
                        <span class="circle"></span>
                        <span class="label"> online </span>
                    </div>
                    <div class="tag offline">
                        <span class="circle"></span>
                        <span class="label"> offline </span>
                    </div>
                </div>
            </div>

            <div class="items">
                    <ul id="arr-list">
                    </ul>
            </div>
        </div>

        <script src="twitchScript.js">
        </script>

    </body>
</html>
